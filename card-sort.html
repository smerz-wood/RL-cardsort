<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Sorting</title>
  <style>
    :root {
      --background: #f5f5f3;
      --surface: #ffffff;
      --surface-muted: #eeeeeb;
      --text: #171717;
      --muted: #6b6b66;
      --border: #d8d8d3;
      --border-strong: #b8b8b1;
      --danger: #9f2f2f;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    button,
    input { font: inherit; }

    button,
    .back-link {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
    }

    button:hover,
    .back-link:hover { border-color: var(--text); }

    button:focus-visible,
    input:focus-visible,
    .back-link:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    button.primary {
      border-color: var(--text);
      background: var(--text);
      color: #fff;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto auto;
      gap: 10px 16px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, .97);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .context { min-width: 0; }

    .context h1 {
      margin: 0;
      overflow: hidden;
      font-size: 1rem;
      font-weight: 650;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .context div {
      margin-top: 2px;
      color: var(--muted);
      font-size: .78rem;
    }

    .participant-field {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: .82rem;
    }

    .participant-code {
      width: 140px;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text);
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .save-status {
      grid-column: 2 / -1;
      min-height: 18px;
      color: var(--muted);
      font-size: .76rem;
      text-align: right;
    }

    .save-status.dirty { color: #835f16; }
    .save-status.saved { color: var(--muted); }

    .main-layout {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 16px;
    }

    .uncategorized-panel {
      position: sticky;
      top: 102px;
      max-height: calc(100vh - 118px);
      overflow: auto;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .panel-heading {
      position: sticky;
      top: 0;
      z-index: 2;
      margin: 0;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: .82rem;
      font-weight: 650;
    }

    .panel-heading span { color: var(--muted); }

    .grid {
      position: relative;
      min-height: 76px;
    }

    .item {
      display: block;
      position: absolute;
    }

    .item.muuri-item-dragging { z-index: 10; }
    .item.muuri-item-releasing { z-index: 8; }

    .item-content {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .uncategorized-grid { padding: 5px; }
    .uncategorized-grid .item,
    .category-card-grid .item { width: 100%; }

    .card {
      width: calc(100% - 8px);
      margin: 4px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface-muted);
      cursor: grab;
      line-height: 1.35;
      user-select: none;
    }

    .card:active { cursor: grabbing; }

    .categories-panel { min-width: 0; }

    .categories-grid > .item { width: min(320px, 100%); }

    .category {
      margin: 0 14px 14px 0;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .category-controls {
      display: flex;
      align-items: center;
      min-height: 34px;
      border-bottom: 1px solid var(--border);
    }

    .category-drag-handle {
      flex: 1;
      height: 34px;
      cursor: grab;
    }

    .category-drag-handle::before {
      content: "···";
      display: block;
      padding: 4px 10px 0;
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 2px;
    }

    .remove-category {
      min-height: 34px;
      padding: 0 10px;
      border: 0;
      border-left: 1px solid var(--border);
      border-radius: 0;
      color: var(--danger);
    }

    .category-title {
      width: calc(100% - 20px);
      height: 40px;
      margin: 4px 10px 5px;
      padding: 0;
      border: 0;
      border-bottom: 1px solid var(--border-strong);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font-weight: 650;
    }

    .category-title::placeholder {
      color: var(--muted);
      font-weight: 400;
    }

    .category-card-grid {
      min-height: 86px;
      margin: 0 5px 5px;
      border: 1px dashed var(--border);
      background: #fafaf8;
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: auto minmax(150px, 1fr) auto;
      }

      .participant-field { grid-column: 2; }
      .toolbar-actions { grid-column: 3; grid-row: 1 / span 2; flex-wrap: wrap; justify-content: flex-end; }
      .save-status { grid-column: 2 / -1; }
    }

    @media (max-width: 720px) {
      .toolbar {
        position: relative;
        grid-template-columns: auto minmax(0, 1fr);
        padding: 10px;
      }

      .participant-field,
      .toolbar-actions,
      .save-status {
        grid-column: 1 / -1;
      }

      .toolbar-actions {
        grid-row: auto;
        justify-content: flex-start;
      }

      .toolbar-actions button { flex: 1 1 auto; }
      .save-status { text-align: left; }

      .main-layout {
        grid-template-columns: 150px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }

      .uncategorized-panel {
        top: 10px;
        max-height: calc(100vh - 20px);
      }

      .categories-grid > .item { width: 100%; }
      .category { margin-right: 0; }
      .card { font-size: .88rem; }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <a class="back-link" href="index.html" aria-label="Back to decks">Back</a>
    <div class="context">
      <h1 class="deck-title">Card sorting</h1>
      <div class="deck-meta"></div>
    </div>
    <label class="participant-field">
      <span>Participant</span>
      <input class="participant-code" maxlength="32" autocomplete="off">
    </label>
    <div class="toolbar-actions">
      <button class="add-category" type="button">Add category</button>
      <button class="save primary" type="button">Save</button>
      <button class="export" type="button">Export CSV</button>
    </div>
    <span class="save-status" aria-live="polite"></span>
  </header>

  <main class="main-layout">
    <aside class="uncategorized-panel">
      <h2 class="panel-heading">Uncategorized <span>(<span class="uncategorized-count">0</span>)</span></h2>
      <div class="grid uncategorized-grid"></div>
    </aside>

    <section class="categories-panel" aria-label="Participant-created categories">
      <div class="grid categories-grid"></div>
    </section>
  </main>

  <template class="card-template">
    <div class="item"><div class="item-content"><div class="card"></div></div></div>
  </template>

  <template class="category-template">
    <div class="item"><div class="item-content"><div class="category">
      <div class="category-controls">
        <div class="category-drag-handle" title="Drag to reorder category" aria-label="Drag to reorder category"></div>
        <button class="remove-category" type="button" title="Remove this empty category">Remove</button>
      </div>
      <input class="category-title" maxlength="120" placeholder="Category name">
      <div class="grid category-card-grid"></div>
    </div></div></div>
  </template>

  <script src="muuri-0.9.5.min.js"></script>
  <script src="decks.js"></script>
  <script src="storage.js"></script>
  <script src="csv-utils.js"></script>
  <script>
    'use strict';
    const params = new URLSearchParams(window.location.search);
    const deckId = params.get('deck');
    const deck = CARD_DECKS[deckId];
    const restartRequested = params.get('restart') === '1';

    if (!deck) {
      window.location.replace('index.html');
      throw new Error('Unknown card deck.');
    }

    let draft = null;
    if (!restartRequested) {
      try {
        draft = CardSortStorage.loadDraft(deckId);
      } catch (error) {
        console.warn('Could not load the saved draft.', error);
      }
    }
    draft = normalizeDraft(draft);

    const deckTitle = document.querySelector('.deck-title');
    const deckMeta = document.querySelector('.deck-meta');
    const participantInput = document.querySelector('.participant-code');
    const statusElement = document.querySelector('.save-status');
    const countElement = document.querySelector('.uncategorized-count');
    const addCategoryButton = document.querySelector('.add-category');
    const saveButton = document.querySelector('.save');
    const exportButton = document.querySelector('.export');
    const cardTemplate = document.querySelector('.card-template');
    const categoryTemplate = document.querySelector('.category-template');
    const cardGrids = [];
    let dirty = false;

    const uncategorizedGrid = new Muuri('.uncategorized-grid', {
      dragEnabled:true,
      dragSort:() => cardGrids,
      dragPlaceholder:{enabled:true, createElement:item => item.getElement().cloneNode(true)},
      dragAutoScroll:{targets:[window], sortDuringScroll:false},
    });
    cardGrids.push(uncategorizedGrid);

    const categoriesGrid = new Muuri('.categories-grid', {
      dragEnabled:true,
      dragSort:true,
      dragHandle:'.category-drag-handle',
      layoutOnResize:false,
    }).on('layoutEnd', () => categoriesGrid.synchronize());

    initialize();

    function normalizeDraft(candidate) {
      const now = new Date().toISOString();
      const isValid = candidate && typeof candidate === 'object';
      const result = isValid && candidate.result && typeof candidate.result === 'object'
        ? candidate.result
        : {};
      const categories = Array.isArray(result.categories) ? result.categories : [];
      const uncategorized = Array.isArray(result.uncategorized)
        ? result.uncategorized
        : deck.cards.map(card => card.id);

      return {
        ...(isValid ? candidate : {}),
        deckId,
        participantCode: isValid && typeof candidate.participantCode === 'string'
          ? candidate.participantCode
          : '',
        createdAt: isValid && candidate.createdAt ? candidate.createdAt : now,
        updatedAt: isValid && candidate.updatedAt ? candidate.updatedAt : now,
        result: { categories, uncategorized },
        _isNew: !isValid || restartRequested,
      };
    }

    function formatSavedTime(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? 'an earlier session' : date.toLocaleString();
    }

    function initialize() {
      deckTitle.textContent = deck.title;
      deckMeta.textContent = `${deck.cards.length} cards · participant-created categories`;
      participantInput.value = draft.participantCode || '';
      for (const cardId of draft.result.uncategorized) createCard(cardId, uncategorizedGrid);
      for (const category of draft.result.categories) createCategory(category);
      if (!draft.result.categories.length) for (let index = 0; index < 3; index += 1) createCategory();
      uncategorizedGrid.on('dragEnd', handleChangedLayout);
      addCategoryButton.addEventListener('click', () => { createCategory(); markDirty(); });
      saveButton.addEventListener('click', saveDraft);
      exportButton.addEventListener('click', exportCsv);
      participantInput.addEventListener('input', markDirty);
      window.addEventListener('beforeunload', event => {
        if (!dirty) return;
        event.preventDefault();
        event.returnValue = '';
      });
      setSaved(draft._isNew ? 'New draft' : `Loaded saved draft from ${formatSavedTime(draft.updatedAt)}`);
      delete draft._isNew;
      refreshLayouts();
    }

    function createCard(cardId, targetGrid) {
      const card = getCardById(deckId, cardId);
      if (!card) return;
      const item = document.importNode(cardTemplate.content.firstElementChild, true);
      const cardElement = item.querySelector('.card');
      cardElement.textContent = card.text;
      cardElement.dataset.cardId = card.id;
      targetGrid.show(targetGrid.add([item], {active:false}), {onFinish:refreshLayouts});
    }

    function createCategory(categoryData = null) {
      const item = document.importNode(categoryTemplate.content.firstElementChild, true);
      const categoryElement = item.querySelector('.category');
      const titleInput = item.querySelector('.category-title');
      const removeButton = item.querySelector('.remove-category');
      const categoryId = categoryData?.id || CardSortStorage.makeId('category');
      categoryElement.dataset.categoryId = categoryId;
      titleInput.value = categoryData?.name || '';
      titleInput.addEventListener('input', markDirty);
      removeButton.addEventListener('click', () => removeEmptyCategory(item));

      categoriesGrid.show(categoriesGrid.add([item], {active:false}), {
        onFinish:() => {
          const innerGrid = new Muuri(item.querySelector('.category-card-grid'), {
            dragEnabled:true,
            dragSort:() => cardGrids,
            dragPlaceholder:{enabled:true, createElement:cardItem => cardItem.getElement().cloneNode(true)},
            dragContainer:document.body,
            dragAutoScroll:{targets:[window], sortDuringScroll:false},
          });
          categoryElement._cardGrid = innerGrid;
          innerGrid.on('dragEnd', handleChangedLayout);
          innerGrid.on('dragReleaseEnd', () => { innerGrid.synchronize(); handleChangedLayout(); });
          cardGrids.push(innerGrid);
          for (const cardId of categoryData?.cards || []) createCard(cardId, innerGrid);
          refreshLayouts();
        },
      });
    }

    function removeEmptyCategory(item) {
      const categoryElement = item.querySelector('.category');
      const innerGrid = categoryElement._cardGrid;
      if (innerGrid && innerGrid.getItems().length) {
        alert('Move the cards out of this category before removing it.');
        return;
      }
      if (!confirm('Remove this empty category?')) return;
      const index = cardGrids.indexOf(innerGrid);
      if (index >= 0) cardGrids.splice(index, 1);
      if (innerGrid) innerGrid.destroy();
      const categoryItem = categoriesGrid.getItem(item);
      if (categoryItem) categoriesGrid.remove([categoryItem], {removeElements:true});
      markDirty();
      refreshLayouts();
    }

    function handleChangedLayout() {
      markDirty();
      refreshLayouts();
    }

    function refreshLayouts() {
      countElement.textContent = String(uncategorizedGrid.getItems().length);
      categoriesGrid.refreshItems().layout();
      for (const grid of cardGrids) grid.refreshItems().layout();
    }

    function uniqueCategoryName(rawName, usedNames, untitledCounter) {
      let base = rawName.trim();
      if (!base) base = `Untitled ${untitledCounter}`;
      let candidate = base;
      let suffix = 1;
      while (usedNames.has(candidate.toLocaleLowerCase())) {
        suffix += 1;
        candidate = `${base} (${suffix})`;
      }
      usedNames.add(candidate.toLocaleLowerCase());
      return candidate;
    }

    function captureDraft() {
      categoriesGrid.synchronize();
      uncategorizedGrid.synchronize();
      const usedNames = new Set();
      let untitledCounter = 0;
      const categories = [];
      for (const categoryItem of categoriesGrid.getItems()) {
        const categoryElement = categoryItem.getElement().querySelector('.category');
        const input = categoryElement.querySelector('.category-title');
        if (!input.value.trim()) untitledCounter += 1;
        const name = uniqueCategoryName(input.value, usedNames, untitledCounter || 1);
        input.value = name;
        const innerGrid = categoryElement._cardGrid;
        innerGrid.synchronize();
        categories.push({
          id: categoryElement.dataset.categoryId,
          name,
          cards: innerGrid.getItems().map(item => item.getElement().querySelector('.card').dataset.cardId),
        });
      }
      draft.participantCode = participantInput.value.trim().slice(0, 32);
      draft.result = {
        categories,
        uncategorized: uncategorizedGrid.getItems().map(item => item.getElement().querySelector('.card').dataset.cardId),
      };
      return draft;
    }

    function saveDraft() {
      if (!participantInput.value.trim()) {
        alert('Enter a participant code or initials before saving.');
        participantInput.focus();
        return null;
      }
      captureDraft();
      draft = CardSortStorage.saveDraft(deckId, draft);
      setSaved(`Saved ${new Date(draft.updatedAt).toLocaleTimeString()}`);
      return draft;
    }

    function exportCsv() {
      const saved = saveDraft();
      if (!saved) return;
      const remaining = saved.result.uncategorized.length;
      if (remaining && !confirm(`${remaining} card${remaining === 1 ? '' : 's'} remain uncategorized. Download the CSV anyway?`)) return;
      CardSortCsv.downloadDraft(deck, saved);
      setSaved('Saved and downloaded CSV');
    }

    function markDirty() {
      dirty = true;
      statusElement.textContent = 'Unsaved changes';
      statusElement.className = 'save-status dirty';
    }

    function setSaved(message) {
      dirty = false;
      statusElement.textContent = message;
      statusElement.className = 'save-status saved';
    }
  </script>
</body>
</html>
