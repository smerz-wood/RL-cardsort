<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Sorting</title>
  <style>
    :root {
      --background: #f5f5f3;
      --surface: #ffffff;
      --text: #171717;
      --muted: #6b6b66;
      --border: #d8d8d3;
      --border-strong: #b8b8b1;
      --danger: #9f2f2f;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    button,
    .button-link { font: inherit; }

    .page {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 650;
      letter-spacing: -.015em;
    }

    .deck-count {
      color: var(--muted);
      font-size: .82rem;
    }

    .deck-list {
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--border);
      list-style: none;
    }

    .deck-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      min-height: 72px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .deck-title {
      margin: 0 0 3px;
      font-size: .96rem;
      font-weight: 600;
    }

    .deck-meta {
      color: var(--muted);
      font-size: .8rem;
    }

    .deck-actions {
      display: flex;
      gap: 8px;
    }

    button,
    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
    }

    button:hover,
    .button-link:hover { border-color: var(--text); }

    button:focus-visible,
    .button-link:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    button.primary,
    .button-link.primary {
      border-color: var(--text);
      background: var(--text);
      color: #fff;
    }

    button.reset,
    .button-link.reset { color: var(--danger); }

    .empty {
      padding: 24px 0;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 760px);
        padding: 32px 0;
      }

      .deck-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .deck-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Card sorting</h1>
      <span class="deck-count"></span>
    </header>

    <ul class="deck-list" aria-label="Available card decks"></ul>
  </main>

  <script src="decks.js"></script>
  <script src="storage.js"></script>
  <script>
    'use strict';

    const deckList = document.querySelector('.deck-list');
    const deckCount = document.querySelector('.deck-count');
    const decks = typeof CARD_DECKS === 'object' && CARD_DECKS ? CARD_DECKS : {};
    const entries = Object.entries(decks);

    deckCount.textContent = `${entries.length} deck${entries.length === 1 ? '' : 's'}`;

    if (!entries.length) {
      const empty = document.createElement('li');
      empty.className = 'empty';
      empty.textContent = 'No card decks are available.';
      deckList.append(empty);
    }

    for (const [deckId, deck] of entries) {
      let savedDraft = null;
      try {
        savedDraft = CardSortStorage.loadDraft(deckId);
      } catch (error) {
        console.warn('Could not read the saved draft.', error);
      }

      const row = document.createElement('li');
      row.className = 'deck-row';

      const details = document.createElement('div');
      const title = document.createElement('h2');
      const meta = document.createElement('div');
      title.className = 'deck-title';
      title.textContent = deck.title;
      meta.className = 'deck-meta';
      meta.textContent = `${deck.cards.length} card${deck.cards.length === 1 ? '' : 's'}`;
      details.append(title, meta);

      const actions = document.createElement('div');
      actions.className = 'deck-actions';

      const openLink = document.createElement('a');
      openLink.className = 'button-link primary';
      openLink.textContent = savedDraft ? 'Continue' : 'Start';
      openLink.href = `cardsort.html?deck=${encodeURIComponent(deckId)}`;
      actions.append(openLink);

      if (savedDraft) {
        const restartLink = document.createElement('a');
        restartLink.className = 'button-link reset';
        restartLink.textContent = 'Restart';
        restartLink.href = `cardsort.html?deck=${encodeURIComponent(deckId)}&restart=1`;
        restartLink.addEventListener('click', event => {
          if (!confirm('Restart this card sort? The saved draft will be replaced when you save.')) {
            event.preventDefault();
          }
        });
        actions.append(restartLink);
      }

      row.append(details, actions);
      deckList.append(row);
    }
  </script>
</body>
</html>
