<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Sorting</title>
  <style>
    :root {
      --background: #f5f5f3;
      --surface: #ffffff;
      --text: #171717;
      --muted: #6b6b66;
      --border: #d8d8d3;
      --border-strong: #b8b8b1;
      --danger: #9f2f2f;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    button { font: inherit; }

    .page {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 650;
      letter-spacing: -.015em;
    }

    .deck-count {
      color: var(--muted);
      font-size: .82rem;
    }

    .deck-list {
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--border);
      list-style: none;
    }

    .deck-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      min-height: 72px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .deck-title {
      margin: 0 0 3px;
      font-size: .96rem;
      font-weight: 600;
    }

    .deck-meta {
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.45;
    }

    .deck-actions {
      display: flex;
      gap: 8px;
    }

    button {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    button:hover { border-color: var(--text); }

    button:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    button.primary {
      border-color: var(--text);
      background: var(--text);
      color: #fff;
    }

    button.reset { color: var(--danger); }

    .empty {
      padding: 24px 0;
      color: var(--muted);
    }

    .page-footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.5;
    }

    .page-footer a { color: inherit; }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 760px);
        padding: 32px 0;
      }

      .deck-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .deck-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Card sorting</h1>
      <span class="deck-count" aria-live="polite"></span>
    </header>

    <ul class="deck-list" aria-label="Available card decks"></ul>

    <footer class="page-footer">
      Drafts are saved only in this browser. Finished results should be exported from the sorting page as CSV.
      <a href="analysis.html">Open result analysis</a>.
    </footer>
  </main>

  <script src="decks.js"></script>
  <script src="storage.js"></script>
  <script>
    'use strict';

    (() => {
      const deckList = document.querySelector('.deck-list');
      const deckCount = document.querySelector('.deck-count');

      if (!window.CARD_DECKS || typeof window.CARD_DECKS !== 'object') {
        renderError('The card decks could not be loaded. Check that decks.js is in the same folder as index.html.');
        return;
      }

      if (!window.CardSortStorage) {
        renderError('Draft storage could not be loaded. Check that storage.js is in the same folder as index.html.');
        return;
      }

      const entries = Object.entries(window.CARD_DECKS);
      deckCount.textContent = `${entries.length} deck${entries.length === 1 ? '' : 's'}`;

      if (!entries.length) {
        renderError('No card decks are available.');
        return;
      }

      for (const [deckId, deck] of entries) {
        const savedDraft = safeLoadDraft(deckId);
        const row = document.createElement('li');
        row.className = 'deck-row';

        const details = document.createElement('div');
        const title = document.createElement('h2');
        const meta = document.createElement('div');

        title.className = 'deck-title';
        title.textContent = deck.title;

        meta.className = 'deck-meta';
        meta.textContent = buildMeta(deck, savedDraft);

        details.append(title, meta);

        const actions = document.createElement('div');
        actions.className = 'deck-actions';

        const openButton = document.createElement('button');
        openButton.type = 'button';
        openButton.className = 'primary';
        openButton.textContent = savedDraft ? 'Continue' : 'Start';
        openButton.addEventListener('click', () => openDeck(deckId, false));
        actions.append(openButton);

        if (savedDraft) {
          const resetButton = document.createElement('button');
          resetButton.type = 'button';
          resetButton.className = 'reset';
          resetButton.textContent = 'Restart';
          resetButton.addEventListener('click', () => openDeck(deckId, true));
          actions.append(resetButton);
        }

        row.append(details, actions);
        deckList.append(row);
      }

      function buildMeta(deck, draft) {
        const cardCount = `${deck.cards.length} card${deck.cards.length === 1 ? '' : 's'}`;
        if (!draft) return cardCount;

        const categorized = Array.isArray(draft.result?.categories)
          ? draft.result.categories.reduce((total, category) => {
              return total + (Array.isArray(category.cards) ? category.cards.length : 0);
            }, 0)
          : 0;

        const updated = draft.updatedAt ? new Date(draft.updatedAt) : null;
        const updatedText = updated && !Number.isNaN(updated.getTime())
          ? `saved ${updated.toLocaleString()}`
          : 'saved draft';

        return `${cardCount} · ${categorized} categorized · ${updatedText}`;
      }

      function safeLoadDraft(deckId) {
        try {
          return CardSortStorage.loadDraft(deckId);
        } catch (error) {
          console.warn(`Could not load the ${deckId} draft.`, error);
          return null;
        }
      }

      function openDeck(deckId, restart) {
        const deck = window.CARD_DECKS[deckId];
        if (!deck) return;

        const hasDraft = Boolean(safeLoadDraft(deckId));
        let mode = hasDraft ? 'continue' : 'start';

        if (restart) {
          const confirmed = window.confirm(
            'Restart this card sort? This permanently discards the saved arrangement, category names, and participant code on this device.'
          );
          if (!confirmed) return;
          mode = 'restart';
        }

        // A unique launch value forces a fresh page load instead of allowing the
        // browser back/forward cache to display the previous sorter DOM.
        const query = new URLSearchParams({
          deck: deckId,
          mode,
          launch: String(Date.now()),
        });

        window.location.href = `card-sort.html?${query.toString()}`;
      }

      function renderError(message) {
        deckCount.textContent = '';
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = message;
        deckList.replaceChildren(empty);
      }
    })();
  </script>
</body>
</html>
